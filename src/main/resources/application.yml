spring:
  application:
    name: tarifa-agua

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tarifa_agua}
    username: ${DB_USER:tarifa}
    password: ${DB_PASSWORD:tarifa}

  jpa:
    hibernate:
      # O schema e gerenciado pelo Flyway; o Hibernate apenas valida o mapeamento.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.testetecnico.tarifaagua: INFO
    org.hibernate.SQL: info
  pattern:
    # Inclui o requestId (correlação) em toda linha, facilitando a análise.
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId:-}] %logger{36} - %msg%n"

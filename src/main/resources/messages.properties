# =====================================================================
# Mensagens da aplicacao - externalizadas e parametrizaveis (i18n).
# Resolvidas via Spring MessageSource; os argumentos {0}, {1}, ... sao
# substituidos em tempo de execucao. Para suportar outros idiomas, basta
# adicionar arquivos messages_<locale>.properties (ex.: messages_en.properties).
# =====================================================================

# ---------- Regras de negocio: faixas ----------
negocio.faixa.coberturaInicial=A primeira faixa da categoria {0} deve iniciar em 0 m³.
negocio.faixa.ordemInvalida=Faixa inválida na categoria {0}: o início ({1} m³) deve ser menor que o fim ({2} m³).
negocio.faixa.sobreposicao=As faixas da categoria {0} se sobrepõem entre os intervalos [{1}-{2}] e [{3}-{4}] m³.
negocio.faixa.lacuna=A cobertura de faixas da categoria {0} está incompleta: existe uma lacuna entre {1} m³ e {2} m³.
negocio.categoria.duplicada=A categoria {0} foi informada mais de uma vez na mesma tabela tarifária.

# ---------- Regras de negocio: calculo ----------
negocio.calculo.semTabelaAtiva=Não há tabela tarifária ativa com faixas cadastradas para a categoria {0}.
negocio.calculo.consumoForaCobertura=O consumo de {0} m³ excede a cobertura máxima das faixas, que é de {1} m³.

# ---------- Recursos ----------
recurso.tabela.naoEncontrada=Tabela tarifária não encontrada para o identificador {0}.

# ---------- Erros de API (genericos) ----------
api.corpoInvalido=O corpo da requisição está ausente, malformado ou contém um valor inválido.
api.parametroInvalido=O parâmetro "{0}" possui um valor inválido.
api.valoresAceitos=Valores aceitos: {0}.
api.requisicaoInvalida=A requisição contém campos inválidos. Verifique os detalhes.
api.parametroObrigatorio=O parâmetro obrigatório "{0}" não foi informado.
api.metodoNaoSuportado=O método HTTP {0} não é suportado neste recurso.
api.rotaNaoEncontrada=O recurso solicitado não foi encontrado: {0}.
api.conflitoIntegridade=A operação não pôde ser concluída por violar uma restrição de integridade dos dados.
api.erroInterno=Ocorreu um erro interno inesperado. Tente novamente mais tarde.
